name: Data Pipeline

on:
  schedule:
    - cron: "0 3 1 * *"  # 1º de cada mês, 3h UTC
  workflow_dispatch:
    inputs:
      city:
        description: "City slug (leave empty for all)"
        required: false
      year:
        description: "Year (leave empty for current year)"
        required: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        working-directory: pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          CITY="${{ github.event.inputs.city }}"
          YEAR="${{ github.event.inputs.year }}"
          ARGS=""
          [ -n "$CITY" ] && ARGS="--city $CITY" || ARGS="--all"
          [ -n "$YEAR" ] && ARGS="$ARGS --year $YEAR"
          python run.py $ARGS
